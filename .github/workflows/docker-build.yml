name: CarsForSale CI

on:
  push:
    branches:
      - main

jobs:

  docker-build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}


      - name: Build Backend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cars-backend:v1 ./backend


      - name: Push Backend Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cars-backend:v1


      - name: Build Frontend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/cars-frontend:v1 ./frontend


      - name: Push Frontend Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/cars-frontend:v1