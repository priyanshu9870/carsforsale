services:
  frontend:
    build: ./frontend
    container_name: cars-frontend
    ports:
      - "3000:3000"

  backend:
    build: ./backend
    container_name: cars-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env 
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: