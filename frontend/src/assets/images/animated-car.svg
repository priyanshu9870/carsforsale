<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="carBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-15px) rotate(1deg); }
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; filter: drop-shadow(0 0 10px #38bdf8); }
        50% { opacity: 1; filter: drop-shadow(0 0 25px #38bdf8); }
      }
      @keyframes speedLine {
        0% { transform: translateX(100%); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateX(-100%); opacity: 0; }
      }
      .car {
        animation: float 4s ease-in-out infinite;
        transform-origin: center;
      }
      .wheel-inner {
        transform-origin: center;
        animation: spin 1.5s linear infinite;
      }
      .headlight {
        animation: pulse 2s infinite;
      }
      .speed-line {
        animation: speedLine 2s linear infinite;
      }
      .speed-line-1 { animation-delay: 0s; animation-duration: 2.5s; }
      .speed-line-2 { animation-delay: 0.5s; animation-duration: 1.8s; }
      .speed-line-3 { animation-delay: 1.2s; animation-duration: 2.2s; }
      .speed-line-4 { animation-delay: 0.8s; animation-duration: 1.5s; }
    </style>
  </defs>

  <!-- Speed Lines -->
  <g stroke="#38bdf8" stroke-width="3" stroke-linecap="round" opacity="0.4" filter="url(#neonGlow)">
    <line x1="800" y1="100" x2="600" y2="100" class="speed-line speed-line-1" />
    <line x1="800" y1="200" x2="500" y2="200" class="speed-line speed-line-2" stroke-width="5" />
    <line x1="800" y1="400" x2="650" y2="400" class="speed-line speed-line-3" />
    <line x1="800" y1="450" x2="550" y2="450" class="speed-line speed-line-4" stroke-width="2" />
  </g>

  <!-- Car Group -->
  <g class="car" transform="translate(100, 150)">
    <!-- Shadow under car -->
    <ellipse cx="300" cy="220" rx="260" ry="15" fill="#000" opacity="0.6" filter="url(#neonGlow)" />

    <!-- Car Body -->
    <path d="M 20 160 C 10 160, 0 140, 10 120 C 30 80, 80 60, 150 50 C 250 35, 350 45, 480 70 C 530 80, 580 100, 590 130 C 595 150, 580 160, 560 160 Z" fill="url(#carBodyGrad)" />
    
    <!-- Cabin (Windows) -->
    <path d="M 140 52 C 200 15, 300 10, 380 30 C 430 43, 460 65, 470 85 L 340 70 C 260 60, 180 65, 140 52 Z" fill="url(#windowGrad)" stroke="#38bdf8" stroke-width="2" />
    <path d="M 330 68 L 470 85 C 470 85, 440 60, 390 40 L 330 68 Z" fill="#0f172a" />
    
    <!-- Doors/Styling lines -->
    <path d="M 160 160 L 160 70 M 340 160 L 340 70" stroke="#0f172a" stroke-width="2" opacity="0.5" />
    <path d="M 40 120 Q 300 90 560 120" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4" />

    <!-- Headlight -->
    <path class="headlight" d="M 540 100 L 590 115 L 580 130 L 530 110 Z" fill="#ffffff" />
    
    <!-- Taillight -->
    <path d="M 10 110 L 30 105 L 30 125 L 10 120 Z" fill="#ef4444" filter="url(#neonGlow)" />

    <!-- Wheel Arches -->
    <path d="M 60 160 A 60 60 0 0 1 180 160" fill="none" stroke="#020617" stroke-width="12" />
    <path d="M 420 160 A 60 60 0 0 1 540 160" fill="none" stroke="#020617" stroke-width="12" />

    <!-- Wheels -->
    <g transform="translate(120, 160)">
      <circle cx="0" cy="0" r="50" fill="#0f172a" stroke="#1e293b" stroke-width="6" />
      <circle cx="0" cy="0" r="35" fill="none" stroke="#38bdf8" stroke-width="3" filter="url(#neonGlow)" />
      <g class="wheel-inner">
        <path d="M -40 0 L 40 0 M 0 -40 L 0 40 M -28 -28 L 28 28 M -28 28 L 28 -28" stroke="#94a3b8" stroke-width="4" />
        <circle cx="0" cy="0" r="12" fill="#2563eb" />
      </g>
    </g>

    <g transform="translate(480, 160)">
      <circle cx="0" cy="0" r="50" fill="#0f172a" stroke="#1e293b" stroke-width="6" />
      <circle cx="0" cy="0" r="35" fill="none" stroke="#38bdf8" stroke-width="3" filter="url(#neonGlow)" />
      <g class="wheel-inner">
        <path d="M -40 0 L 40 0 M 0 -40 L 0 40 M -28 -28 L 28 28 M -28 28 L 28 -28" stroke="#94a3b8" stroke-width="4" />
        <circle cx="0" cy="0" r="12" fill="#2563eb" />
      </g>
    </g>
  </g>
</svg>
